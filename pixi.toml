[workspace]
authors = ["Sierra Arn"]
name = "ensam3d-lib"
version = "0.2.0"
channels = ["nvidia", "conda-forge"]
platforms = [{ platform = "linux-64", cuda = "12.8" }]
requires-pixi = ">=0.71.1"

[dependencies]
python = ">=3.12.13,<3.13"
numpy = ">=1.26.4,<2"
cuda-toolkit = ">=12.8.2,<13"
pytorch-gpu = ">=2.5.1,<3"
torchvision = ">=0.20.1,<0.21"
ultralytics = ">=8.4.46,<9"
timm = ">=1.0.26,<2"
opencv = ">=4.10.0,<5"
jaxtyping = ">=0.3.7,<0.4"
huggingface_hub = ">=1.13.0,<2"

[pypi-dependencies]
roma = ">=1.5.6, <2"
ensam3d-lib = { path = ".", editable = true }
